version: "3.9"

# ── ITR-1 RAG Agent — Docker Compose ─────────────────────────────────────────
# Run with: docker compose up --build
# Services start order: db/redis → python services → api-gateway → frontend
#
# After first run, embed knowledge base:
#   docker compose exec rag-service python /app/knowledge-base/embedder.py --backend huggingface

networks:
  itr1-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  vector_store:
  uploads:

# ── Common Python env ──────────────────────────────────────────────────────────

x-python-common: &python-common
  networks: [itr1-net]
  environment: &python-env
    GROQ_API_KEY:       ${GROQ_API_KEY}
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    OPENAI_API_KEY:     ${OPENAI_API_KEY:-}
    PYTHONUNBUFFERED:   "1"
    REDIS_URL:          redis://redis:6379/0
    DATABASE_URL:       postgresql://itr1:itr1pass@postgres:5432/itr1db
  restart: unless-stopped
  depends_on:
    postgres: { condition: service_healthy }
    redis:    { condition: service_started }

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    networks: [itr1-net]
    environment:
      POSTGRES_USER:     itr1
      POSTGRES_PASSWORD: itr1pass
      POSTGRES_DB:       itr1db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itr1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks: [itr1-net]
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── Python: Doc Parser ────────────────────────────────────────────────────

  doc-parser:
    <<: *python-common
    build:
      context: ./doc-parser
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - uploads:/tmp/itr1-uploads
      - ./shared:/app/shared:ro
    environment:
      <<: *python-env
      UPLOAD_DIR: /tmp/itr1-uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Python: RAG Service ───────────────────────────────────────────────────

  rag-service:
    <<: *python-common
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - vector_store:/app/vector_store
      - ./shared:/app/shared:ro
      - ./knowledge-base:/app/knowledge-base:ro
    environment:
      <<: *python-env
      VECTOR_STORE_DIR: /app/vector_store
      DEFAULT_AY:       AY2024-25
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Python: Agent Orchestrator ────────────────────────────────────────────

  agent-orchestrator:
    <<: *python-common
    build:
      context: ./agent-orchestrator
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared:ro
    environment:
      <<: *python-env
      RAG_SERVICE_URL:  http://rag-service:8001
      DOC_PARSER_URL:   http://doc-parser:8002
    depends_on:
      doc-parser:  { condition: service_healthy }
      rag-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Node.js: API Gateway ──────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    networks: [itr1-net]
    ports:
      - "3001:3001"
    environment:
      PORT:              3001
      DOC_PARSER_URL:    http://doc-parser:8002
      RAG_SERVICE_URL:   http://rag-service:8001
      AGENT_ORCH_URL:    http://agent-orchestrator:8000
      FRONTEND_URL:      http://localhost:3000
      JWT_SECRET:        ${JWT_SECRET:-dev-secret-change-in-prod}
      SKIP_AUTH:         ${SKIP_AUTH:-true}
    depends_on:
      agent-orchestrator: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Next.js: Frontend ─────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks: [itr1-net]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      api-gateway: { condition: service_healthy }
    restart: unless-stopped
